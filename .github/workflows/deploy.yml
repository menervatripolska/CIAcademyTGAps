name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true пробует автоматически включить Pages, если ещё не включён.
      # Требует, чтобы у GITHUB_TOKEN была роль "Read and write" (Settings → Actions → General).
      # Если упало с 403 — включи Pages руками: Settings → Pages → Source: GitHub Actions.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
